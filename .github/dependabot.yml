version: 2
updates:
  # Go backend
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Vue frontend (pnpm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      types:
        patterns:
          - "@types/*"
      vue-ecosystem:
        patterns:
          - "vue"
          - "vue-*"
          - "@vitejs/*"
          - "@vue/*"
      dev-dependencies:
        dependency-type: "development"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # pnpm/action-setup@v6 ships a regression that fails CI with
      # ERR_PNPM_BROKEN_LOCKFILE against valid lockfileVersion 9.0
      # lockfiles even with an explicit version pin. Re-evaluate when
      # v7 ships or when upstream fixes the v6 regression.
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]
