exceptions:
  - package: github.com/docker/docker
    advisory: "GHSA-x744-4wpc-v9h2"
    severity: high
    reason: "Moby AuthZ plugin bypass via oversized request bodies. Fix requires Moby v29.3.1+, which is not yet published as a Go module tag (latest Go-module-tagged release is v28.5.2 as of April 2026). The Docker client is only used in backend testcontainers integration tests — we do not run a Docker daemon with AuthZ plugins in production."
    mitigation: "Transitive dep via testcontainers-go. Production code does not embed a Docker daemon. Revisit once Moby publishes a v29.x Go module tag."
    expires_on: "2026-07-09"
    owner: "security@your-domain"
