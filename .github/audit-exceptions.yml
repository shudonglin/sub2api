    advisory: "GHSA-pxq6-2prw-chj9"
    severity: medium
    reason: "Moby off-by-one error in plugin privilege validation. Same upstream situation as GHSA-x744-4wpc-v9h2 — fix requires Moby v29.3.1+, not yet available as a Go module tag."
    mitigation: "Transitive dep via testcontainers-go. We do not load Docker plugins in production. Revisit once Moby publishes a v29.x Go module tag."
